<!DOCTYPE html>

<head>

    <style>
        body {
            font-family: Arial;
            width: 400px;

        #taskInput {

        ul { padding: 0; }

            list-style: none;
            background: #f0f0f0;

        }

</head>
<body>

<h2>To-Do List</h2>
<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>
